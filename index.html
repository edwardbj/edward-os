<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edward OS</title>
<!--
  ============================================
  Edward OS v0.5
  Changes from v0.4:
  - KST clock now shows seconds, ticking live
  - "Today's Line" renamed to "Motivation of the Day"
  - NEW: Deadlines — enter anything with a due date
    (name, due, genre). The app computes D-day,
    sorts by urgency, flags what to start first,
    and can push a deadline into Today as a task.
  ============================================
-->
<style>
  :root {
    color-scheme: light;
    --bg: #fafafa;
    --card: #ffffff;
    --text: #18181b;
    --muted: #71717a;
    --faint: #a1a1aa;
    --line: #e4e4e7;
    --accent: #16a34a;      /* vivid green */
    --accent-soft: #e7f6ec;
    --d1: #2563eb;
    --d2: #d97706;
    --d3: #059669;
    --dp: #64748b;
    --red: #dc2626;
    --orange: #ea580c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", sans-serif;
    background: var(--bg); color: var(--text);
    max-width: 560px; margin: 0 auto; padding: 20px 16px 110px;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- top bar ---------- */
  .top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
  .top h1 { font-size: 17px; font-weight: 800; letter-spacing: -0.3px; }
  .top .date { font-size: 13px; color: var(--muted); margin-top: 3px; }
  .top .env { font-size: 12.5px; color: var(--faint); margin-top: 2px; font-variant-numeric: tabular-nums; }
  .chips { display: flex; gap: 6px; }
  .chip {
    font-size: 12px; font-weight: 600; color: var(--muted);
    background: var(--card); border: 1px solid var(--line);
    border-radius: 99px; padding: 4px 10px; white-space: nowrap;
  }
  .chip b { color: var(--text); }

  /* ---------- focus hero ---------- */
  .focus {
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    padding: 16px; margin-bottom: 10px;
  }
  .focus .label { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; color: var(--accent); }
  .focus .row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
  .focus input[type=checkbox] { width: 22px; height: 22px; accent-color: var(--accent); flex-shrink: 0; }
  .focus input[type=text] {
    flex: 1; border: none; outline: none; font-size: 17px; font-weight: 650;
    background: transparent; color: var(--text); padding: 2px 0;
  }
  .focus input[type=text]::placeholder { color: var(--faint); font-weight: 400; }
  .focus.done input[type=text] { text-decoration: line-through; color: var(--muted); }

  /* ---------- status strip ---------- */
  .strip {
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    padding: 12px 16px; margin-bottom: 18px;
  }
  .strip .bar { height: 10px; background: #f1f1f4; border-radius: 99px; overflow: hidden; margin-bottom: 8px; }
  /* iridescent rainbow progress — flows like a game XP bar */
  .strip .fill {
    height: 100%; border-radius: 99px; transition: width .5s ease;
    background: linear-gradient(90deg,
      #ff5e62, #ff9966, #ffd166, #06d6a0, #4cc9f0, #a06cf0, #ff5e62);
    background-size: 300% 100%;
    animation: iridescent 5s linear infinite;
    box-shadow: 0 0 8px rgba(160,108,240,.35);
  }
  @keyframes iridescent {
    0%   { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }
  .strip .nums { display: flex; justify-content: space-between; font-size: 12.5px; color: var(--muted); }
  .strip .nums b { color: var(--text); font-weight: 650; }

  /* ---------- section heads ---------- */
  .listhead { display: flex; justify-content: space-between; align-items: center; margin: 6px 4px 10px; }
  .listhead h2 {
    font-size: 17px; font-weight: 800; letter-spacing: -0.3px; color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }
  /* colored marker in front of each section title */
  .listhead h2::before {
    content: ''; width: 5px; height: 18px; border-radius: 3px; background: var(--accent);
  }
  .listhead .hint { font-size: 11.5px; color: var(--faint); }
  .list { background: var(--card); border: 1px solid var(--line); border-radius: 16px; overflow: hidden; margin-bottom: 18px; }

  /* ---------- add rows ---------- */
  .addrow { display: flex; gap: 6px; padding: 12px; border-bottom: 1px solid var(--line); background: #fcfcfd; flex-wrap: wrap; }
  .addrow input[type=text] {
    flex: 1 1 100%; border: 1px solid var(--line); border-radius: 10px;
    padding: 10px 12px; font-size: 15px; outline: none; background: var(--card);
  }
  .addrow input[type=text]:focus { border-color: #fa7268; box-shadow: 0 0 0 3px rgba(250,114,104,.15); }
  .addrow input[type=date] {
    border: 1px solid var(--line); border-radius: 8px; padding: 6px 8px;
    font-size: 12.5px; background: var(--card); color: var(--muted);
  }
  .addrow select {
    border: 1px solid var(--line); border-radius: 8px; padding: 7px 8px;
    font-size: 12.5px; background: var(--card); color: var(--muted); cursor: pointer;
  }
  .addrow button {
    flex: 1; border: none; border-radius: 8px; color: #fff;
    font-size: 13px; font-weight: 700; padding: 7px 14px; cursor: pointer;
    /* vibrant salmon pink */
    background: linear-gradient(135deg, #ff9a8b, #fa7268 55%, #f65e7a);
    box-shadow: 0 2px 10px rgba(250,114,104,.35);
  }
  .addrow button:active { transform: scale(.98); }

  /* ---------- deadline rows ---------- */
  .dl { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--line); }
  .dl:last-child { border-bottom: none; }
  .dl input[type=checkbox] { width: 20px; height: 20px; accent-color: var(--accent); flex-shrink: 0; }
  .dl .body { flex: 1; min-width: 0; }
  .dl .title { font-size: 15px; line-height: 1.35; }
  .dl .meta { font-size: 12px; color: var(--faint); margin-top: 2px; }
  .dl .next { font-size: 11px; font-weight: 700; color: var(--accent); }
  .dbadge {
    font-size: 12px; font-weight: 800; border-radius: 8px; padding: 5px 9px;
    flex-shrink: 0; font-variant-numeric: tabular-nums;
    background: #f1f1f4; color: var(--muted);
  }
  .dbadge.warn { background: #fff7ed; color: var(--orange); }
  .dbadge.hot { background: #fef2f2; color: var(--red); }
  .dl .push {
    border: 1px solid var(--line); background: var(--card); color: var(--accent);
    border-radius: 8px; font-size: 11.5px; font-weight: 700; padding: 6px 9px; cursor: pointer; flex-shrink: 0;
  }
  .dl .del { border: none; background: none; color: #d4d4d8; font-size: 15px; cursor: pointer; padding: 4px; }

  /* ---------- task rows ---------- */
  .task { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--line); }
  .task:last-child { border-bottom: none; }
  .task input[type=checkbox] { width: 20px; height: 20px; accent-color: var(--accent); flex-shrink: 0; }
  .task .body { flex: 1; min-width: 0; }
  .task .title { font-size: 15px; line-height: 1.35; }
  .task .meta { font-size: 12px; color: var(--faint); margin-top: 2px; display: flex; gap: 8px; align-items: center; }
  .dot { width: 8px; height: 8px; border-radius: 99px; display: inline-block; flex-shrink: 0; }
  .dot.D1 { background: var(--d1); } .dot.D2 { background: var(--d2); } .dot.D3 { background: var(--d3); } .dot.P { background: var(--dp); }
  .task.done .title { text-decoration: line-through; color: var(--muted); }
  .ubadge {
    border: none; border-radius: 7px; font-size: 11.5px; font-weight: 800;
    padding: 4px 7px; cursor: pointer; flex-shrink: 0; color: #fff;
    font-variant-numeric: tabular-nums;
  }
  .u1 { background: #d4d4d8; } .u2 { background: #a1a1aa; } .u3 { background: #64748b; }
  .u4 { background: #ea580c; } .u5 { background: #dc2626; }
  .task .play {
    width: 34px; height: 34px; border-radius: 99px; border: 1px solid var(--line);
    background: var(--card); color: var(--accent); font-size: 13px; cursor: pointer; flex-shrink: 0;
  }
  .task .play:hover { background: var(--accent-soft); }
  .task .del { border: none; background: none; color: #d4d4d8; font-size: 15px; cursor: pointer; padding: 4px; }
  .empty { color: var(--faint); font-size: 13.5px; text-align: center; padding: 22px 0; }

  /* ---------- footer: motivation of the day ---------- */
  .quotebox { text-align: center; padding: 22px 12px 10px; }
  .qlabel { font-size: 10px; font-weight: 800; letter-spacing: 1.6px; color: var(--faint); margin-bottom: 6px; }
  .quote { font-size: 13.5px; color: var(--muted); font-style: italic; line-height: 1.6; }
  .qby { font-size: 12px; color: var(--faint); margin-top: 4px; }
  .tools { display: flex; gap: 8px; justify-content: center; }
  .tools button { border: none; background: none; font-size: 12px; color: var(--faint); cursor: pointer; text-decoration: underline; }

  /* ---------- sticky timer bar ---------- */
  .timerbar {
    position: fixed; left: 50%; transform: translateX(-50%); bottom: 16px;
    width: calc(100% - 32px); max-width: 528px;
    background: var(--text); color: #fff; border-radius: 16px;
    padding: 12px 16px; display: none; align-items: center; gap: 12px;
    box-shadow: 0 8px 30px rgba(0,0,0,.25);
  }
  .timerbar.on { display: flex; }
  .timerbar .t { font-size: 22px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: 1px; }
  .timerbar .name { flex: 1; font-size: 13px; opacity: .8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .timerbar button {
    border: none; border-radius: 8px; padding: 8px 12px; font-size: 12.5px; font-weight: 700; cursor: pointer;
    background: #ffffff22; color: #fff;
  }
  .timerbar button.stop { background: #ffffff11; color: #ffffffaa; }
</style>
</head>
<body>

<div class="top">
  <div>
    <h1>Edward OS</h1>
    <div class="date" id="datetext"></div>
    <div class="env"><span id="ktime"></span> KST<span id="temp"></span></div>
  </div>
  <div class="chips">
    <span class="chip">Lv <b id="level">1</b></span>
    <span class="chip">🔥 <b id="streak">0</b></span>
  </div>
</div>

<div class="focus" id="focuscard">
  <div class="label">TODAY'S FOCUS</div>
  <div class="row">
    <input type="checkbox" id="onecheck" onchange="toggleOne()">
    <input type="text" id="oneinput" placeholder="Set today's focus">
  </div>
</div>

<div class="strip">
  <div class="bar"><div class="fill" id="dayfill" style="width:0%"></div></div>
  <div class="nums">
    <span><b id="ndone">0</b>/<b id="ntotal">0</b> done</span>
    <span><b id="nmin">0</b> focus min</span>
    <span><b id="nxp">0</b> 💋 today</span>
    <span id="xpnext">💕 100 to Lv 2</span>
  </div>
</div>

<!-- Deadlines: anything with a due date, visible or not on the calendar -->
<div class="listhead">
  <h2>⏰ Deadlines</h2>
  <span class="hint">sorted by due date · ↳ pushes into Today</span>
</div>
<div class="list">
  <div class="addrow">
    <input type="text" id="newdl" placeholder="What must be done? (name & scope)" onkeydown="if(event.key==='Enter')addDeadline()">
    <input type="date" id="newdldate">
    <select id="newdlgenre">
      <option value="AX">Work · AX</option>
      <option value="CEO">Work · CEO</option>
      <option value="General">Work · General</option>
      <option value="PlanE">Plan E</option>
      <option value="Growth">Growth</option>
      <option value="Personal">Personal</option>
    </select>
    <button onclick="addDeadline()">Add</button>
  </div>
  <div id="dllist"></div>
</div>

<div class="listhead">
  <h2>✅ Today</h2>
  <span class="hint">sorted by urgency · tap U to re-rate</span>
</div>
<div class="list">
  <div class="addrow">
    <input type="text" id="newtask" placeholder="Add a task…" onkeydown="if(event.key==='Enter')addTask()">
    <select id="newdomain">
      <option value="D1">Work</option>
      <option value="D2">Plan E</option>
      <option value="D3" selected>Growth</option>
      <option value="P">Personal</option>
    </select>
    <select id="newest">
      <option value="10">10m</option>
      <option value="25" selected>25m</option>
      <option value="45">45m</option>
    </select>
    <select id="newurg">
      <option value="1">U1</option>
      <option value="2">U2</option>
      <option value="3" selected>U3</option>
      <option value="4">U4</option>
      <option value="5">U5</option>
    </select>
    <button onclick="addTask()">Add</button>
  </div>
  <div id="tasklist"></div>
</div>

<div class="quotebox">
  <div class="qlabel">MOTIVATION OF THE DAY</div>
  <div class="quote" id="quote"></div>
  <div class="qby" id="quoteby"></div>
</div>
<div class="tools">
  <button onclick="exportData()">Export</button>
  <button onclick="document.getElementById('importfile').click()">Import</button>
  <input type="file" id="importfile" accept=".json" style="display:none" onchange="importData(event)">
</div>

<div class="timerbar" id="timerbar">
  <span class="t" id="clock">25:00</span>
  <span class="name" id="timername"></span>
  <button id="pausebtn" onclick="toggleTimer()">Pause</button>
  <button class="stop" onclick="stopTimer()">End</button>
</div>

<script>
/* ============ data ============ */
const KEY = 'edwardOS';
let state = load();

function load() {
  try {
    const s = JSON.parse(localStorage.getItem(KEY)) || fresh();
    s.tasks = s.tasks || []; s.deadlines = s.deadlines || [];
    s.tasks.forEach(t => { if (!t.u) t.u = 3; });
    return s;
  } catch(e) { return fresh(); }
}
function fresh() {
  return { tasks: [], deadlines: [], one: '', oneDone: false, oneDate: '', xp: 0,
           streak: 0, lastDoneDate: '', todayXP: 0, todayMin: 0, todayDate: '' };
}
function save() { localStorage.setItem(KEY, JSON.stringify(state)); }
function todayStr() { return new Date().toISOString().slice(0,10); }

function rollover() {
  const t = todayStr();
  if (state.todayDate !== t) {
    state.todayDate = t; state.todayXP = 0; state.todayMin = 0;
    state.tasks = state.tasks.filter(x => !x.done);
    if (state.oneDate !== t) { state.one = ''; state.oneDone = false; state.oneDate = t; }
    const yest = new Date(Date.now() - 864e5).toISOString().slice(0,10);
    if (state.lastDoneDate !== yest && state.lastDoneDate !== t) state.streak = 0;
    save();
  }
}

/* ============ header: date, lunar, clock, weather ============ */
function lunarDate() {
  try {
    const parts = new Intl.DateTimeFormat('ko-u-ca-dangi', { month: 'numeric', day: 'numeric' })
      .formatToParts(new Date());
    const m = parts.find(p => p.type === 'month').value;
    const d = parts.find(p => p.type === 'day').value;
    return `음 ${m}.${d}`;
  } catch(e) { return ''; }
}
function renderDate() {
  const d = new Date();
  const main = d.toLocaleDateString('en-US', { weekday:'short', year:'numeric', month:'short', day:'numeric' });
  const lunar = lunarDate();
  document.getElementById('datetext').textContent = lunar ? `${main} (${lunar})` : main;
}
function renderClock() {
  document.getElementById('ktime').textContent =
    new Date().toLocaleTimeString('en-GB', { timeZone:'Asia/Seoul', hour:'2-digit', minute:'2-digit', second:'2-digit' });
}
async function loadWeather() {
  try {
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=37.5665&longitude=126.9780&current=temperature_2m');
    const j = await r.json();
    document.getElementById('temp').textContent = ' · Seoul ' + Math.round(j.current.temperature_2m) + '°C';
  } catch(e) { /* offline — show nothing */ }
}

/* ============ deadlines ============ */
const GENRE_DOMAIN = { AX:'D1', CEO:'D1', General:'D1', PlanE:'D2', Growth:'D3', Personal:'P',
                       /* legacy values from earlier versions */
                       ERP:'D1', AI:'D1', Web:'D1', Mkt:'D1', Work:'D1', Side:'D2' };
const GENRE_LABEL = { AX:'Work · AX', CEO:'Work · CEO', General:'Work · General', PlanE:'Plan E',
                      Growth:'Growth', Personal:'Personal',
                      /* legacy labels */
                      ERP:'Work · ERP', AI:'Work · AI', Web:'Work · Website', Mkt:'Work · Marketing',
                      Work:'Work', Side:'Plan E' };

function addDeadline() {
  const title = document.getElementById('newdl').value.trim();
  const due = document.getElementById('newdldate').value;
  if (!title) return;
  if (!due) { alert('Pick a due date.'); return; }
  state.deadlines.push({ id: Date.now(), title, due, genre: document.getElementById('newdlgenre').value });
  document.getElementById('newdl').value = '';
  save(); render();
}
function doneDeadline(id) {
  state.deadlines = state.deadlines.filter(x => x.id !== id);
  gainXP(20);   // shipping something with a deadline = +20 XP
  save(); render();
}
function delDeadline(id) {
  state.deadlines = state.deadlines.filter(x => x.id !== id);
  save(); render();
}
function daysLeft(due) {
  return Math.ceil((new Date(due + 'T23:59:59') - new Date()) / 864e5);
}
/* urgency suggestion from due date: <=2d -> U5, <=5d -> U4, <=10d -> U3, else U2 */
function urgencyFromDue(due) {
  const n = daysLeft(due);
  return n <= 2 ? 5 : n <= 5 ? 4 : n <= 10 ? 3 : 2;
}
function pushToToday(id) {
  const d = state.deadlines.find(x => x.id === id);
  if (!d) return;
  state.tasks.push({
    id: Date.now(), title: d.title,
    domain: GENRE_DOMAIN[d.genre] || 'D1',
    est: 25, u: urgencyFromDue(d.due), done: false
  });
  save(); render();
}

/* ============ focus ============ */
function toggleOne() {
  if (!state.one.trim()) { document.getElementById('onecheck').checked = false; return; }
  state.oneDone = document.getElementById('onecheck').checked;
  state.oneDate = todayStr();
  if (state.oneDone) gainXP(30);
  else { state.xp = Math.max(0, state.xp - 30); state.todayXP = Math.max(0, state.todayXP - 30); }
  save(); render();
}

/* ============ tasks ============ */
function addTask() {
  const input = document.getElementById('newtask');
  const title = input.value.trim();
  if (!title) return;
  state.tasks.push({
    id: Date.now(), title,
    domain: document.getElementById('newdomain').value,
    est: parseInt(document.getElementById('newest').value),
    u: parseInt(document.getElementById('newurg').value),
    done: false
  });
  input.value = '';
  save(); render();
}
function toggleTask(id) {
  const t = state.tasks.find(x => x.id === id);
  t.done = !t.done;
  if (t.done) { gainXP(t.est); }
  else { state.xp = Math.max(0, state.xp - t.est); state.todayXP = Math.max(0, state.todayXP - t.est); }
  save(); render();
}
function cycleUrgency(id) {
  const t = state.tasks.find(x => x.id === id);
  t.u = t.u % 5 + 1;
  save(); render();
}
function delTask(id) {
  state.tasks = state.tasks.filter(x => x.id !== id);
  save(); render();
}

/* ============ xp & streak ============ */
function gainXP(n) { state.xp += n; state.todayXP += n; markActive(); }
function markActive() {
  const t = todayStr();
  if (state.lastDoneDate !== t) {
    const yest = new Date(Date.now() - 864e5).toISOString().slice(0,10);
    state.streak = (state.lastDoneDate === yest) ? state.streak + 1 : 1;
    state.lastDoneDate = t;
  }
}

/* ============ timer ============ */
let timerSec = 0, timerRunning = false, timerInterval = null, timerTaskId = null;

function pickFocus(id) {
  const t = state.tasks.find(x => x.id === id);
  if (!t) return;
  timerTaskId = id;
  timerSec = t.est * 60;
  document.getElementById('timername').textContent = t.title;
  document.getElementById('timerbar').classList.add('on');
  startTicking();
}
function startTicking() {
  clearInterval(timerInterval);
  timerRunning = true;
  document.getElementById('pausebtn').textContent = 'Pause';
  timerInterval = setInterval(() => {
    timerSec--;
    if (timerSec <= 0) finishTimer();
    renderTimer();
  }, 1000);
  renderTimer();
}
function toggleTimer() {
  if (timerRunning) {
    clearInterval(timerInterval); timerRunning = false;
    document.getElementById('pausebtn').textContent = 'Resume';
  } else startTicking();
}
function stopTimer() {
  clearInterval(timerInterval); timerRunning = false; timerTaskId = null;
  document.getElementById('timerbar').classList.remove('on');
  document.title = 'Edward OS';
}
function finishTimer() {
  clearInterval(timerInterval); timerRunning = false;
  const t = state.tasks.find(x => x.id === timerTaskId);
  state.todayMin += t ? t.est : 25;
  gainXP(5);
  if (t && !t.done) { t.done = true; gainXP(t.est); }
  stopTimer();
  save(); render();
  alert('Done. Kisses earned 💋 — now stand up and get some water.');
}
function renderTimer() {
  const m = String(Math.max(0, Math.floor(timerSec/60))).padStart(2,'0');
  const s = String(Math.max(0, timerSec%60)).padStart(2,'0');
  document.getElementById('clock').textContent = m + ':' + s;
  if (timerTaskId) document.title = `${m}:${s} — Edward OS`;
}

/* ============ motivation of the day ============ */
const QUOTES = [
  { q: "That's hot.", by: 'Paris Hilton, reviewing your finished task list' },
  { q: 'Everybody has a plan until they get punched in the mouth.', by: 'Mike Tyson, describing your Q3 schedule' },
  { q: "You will NOT end up an old maiden in them dusty shoes.", by: 'Tiffany “New York” Pollard, approximately' },
  { q: "If you can't love yourself, how in the hell you gonna love somebody else?", by: 'RuPaul' },
  { q: 'This is fine.', by: 'the meme dog, and also you, three days before the ERP deadline' },
  { q: "Katakana is still waiting. It's been 4 months. It has feelings.", by: 'your app, judging you gently' },
  { q: 'No level skips. Kisses are earned.', by: 'Edward OS' },
  { q: 'Stay calm. One thing at a time.', by: 'your inner Evy Poumpouras' },
  { q: 'The ERP will not upgrade itself. We checked.', by: 'Edward OS engineering team (me)' },
  { q: "Read one line of the company's financials today. One line counts.", by: 'your future CFO self' },
  { q: 'Slow is smooth, smooth is fast.', by: 'Navy SEALs, and also good golf swings' },
  { q: 'Level up quietly. Let the results make the noise.', by: 'Edward OS' },
];
function renderQuote() {
  const x = QUOTES[new Date().getDate() % QUOTES.length];
  document.getElementById('quote').textContent = '“' + x.q + '”';
  document.getElementById('quoteby').textContent = '— ' + x.by;
}

/* ============ backup ============ */
function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'edwardOS-backup-' + todayStr() + '.json';
  a.click();
}
function importData(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      state = JSON.parse(e.target.result);
      state.tasks = state.tasks || []; state.deadlines = state.deadlines || [];
      state.tasks.forEach(t => { if (!t.u) t.u = 3; });
      save(); render(); alert('Restored.');
    } catch(err) { alert('Invalid file.'); }
  };
  reader.readAsText(file);
}

/* ============ render ============ */
const DOMAIN_LABEL = { D1: 'Work', D2: 'Plan E', D3: 'Growth', P: 'Personal' };

function render() {
  rollover();
  renderDate();
  renderClock();

  const level = Math.floor(state.xp / 100) + 1;
  document.getElementById('level').textContent = level;
  document.getElementById('streak').textContent = state.streak;
  document.getElementById('xpnext').textContent = '💕 ' + (100 - state.xp % 100) + ' to Lv ' + (level + 1);

  document.getElementById('oneinput').value = state.one;
  document.getElementById('onecheck').checked = state.oneDone;
  document.getElementById('focuscard').classList.toggle('done', state.oneDone);

  const total = state.tasks.length + (state.one.trim() ? 1 : 0);
  const done = state.tasks.filter(t => t.done).length + (state.oneDone ? 1 : 0);
  document.getElementById('ndone').textContent = done;
  document.getElementById('ntotal').textContent = total;
  document.getElementById('nmin').textContent = state.todayMin;
  document.getElementById('nxp').textContent = state.todayXP;
  document.getElementById('dayfill').style.width = (total ? Math.round(done/total*100) : 0) + '%';

  /* deadlines: soonest first; the top one is what to start first */
  const dl = document.getElementById('dllist');
  if (!state.deadlines.length) {
    dl.innerHTML = '<div class="empty">No deadlines tracked</div>';
  } else {
    const sorted = [...state.deadlines].sort((a,b) => a.due.localeCompare(b.due));
    dl.innerHTML = sorted.map((d, i) => {
      const n = daysLeft(d.due);
      const badge = n < 0 ? `over ${-n}d` : n === 0 ? 'D-DAY' : `D-${n}`;
      const cls = n <= 2 ? 'hot' : n <= 5 ? 'warn' : '';
      return `
      <div class="dl">
        <input type="checkbox" onchange="doneDeadline(${d.id})" title="mark as shipped">
        <div class="body">
          <div class="title">${escapeHtml(d.title)}</div>
          <div class="meta">${GENRE_LABEL[d.genre] || d.genre} · due ${d.due}${i === 0 ? ' · <span class="next">← start with this</span>' : ''}</div>
        </div>
        <span class="dbadge ${cls}">${badge}</span>
        <button class="push" onclick="pushToToday(${d.id})" title="add a 25m session to Today">↳ Today</button>
        <button class="del" onclick="delDeadline(${d.id})">✕</button>
      </div>`;
    }).join('');
  }

  const list = document.getElementById('tasklist');
  if (!state.tasks.length) {
    list.innerHTML = '<div class="empty">No tasks yet</div>';
  } else {
    const sorted = [...state.tasks].sort((a,b) =>
      a.done - b.done || b.u - a.u || a.domain.localeCompare(b.domain));
    list.innerHTML = sorted.map(t => `
      <div class="task ${t.done ? 'done' : ''}">
        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${t.id})">
        <div class="body">
          <div class="title">${escapeHtml(t.title)}</div>
          <div class="meta"><span class="dot ${t.domain}"></span>${DOMAIN_LABEL[t.domain]} · ${t.est}m</div>
        </div>
        <button class="ubadge u${t.u}" onclick="cycleUrgency(${t.id})" title="tap to change urgency">U${t.u}</button>
        ${t.done ? '' : `<button class="play" onclick="pickFocus(${t.id})">▶</button>`}
        <button class="del" onclick="delTask(${t.id})">✕</button>
      </div>`).join('');
  }
  renderQuote();
}
function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

document.getElementById('oneinput').addEventListener('input', e => {
  state.one = e.target.value; state.oneDate = todayStr(); save();
});

render();
loadWeather();
setInterval(renderClock, 1000);   // live seconds
</script>
</body>
</html>
