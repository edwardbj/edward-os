<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edward OS</title>
<!--
  ============================================
  Edward OS v0.2
  Changes from v0.1:
  - UI language: English
  - Clear hierarchy: STEP 1 -> 4 flow so you always
    know what matters first
  Data lives in this browser's localStorage.
  Back up with the Export button at the bottom.
  ============================================
-->
<style>
  :root {
    color-scheme: light;
    --bg: #f6f7f9;
    --card: #ffffff;
    --text: #1a1d21;
    --muted: #6b7280;
    --line: #e5e7eb;
    --d1: #2563eb;   /* D1 Work = blue */
    --d2: #d97706;   /* D2 Side = amber */
    --d3: #059669;   /* D3 Growth = green */
    --accent: #111827;
    --xp: #7c3aed;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", sans-serif;
    background: var(--bg); color: var(--text);
    max-width: 640px; margin: 0 auto; padding: 16px 14px 60px;
  }
  h1 { font-size: 20px; letter-spacing: -0.5px; }
  .sub { color: var(--muted); font-size: 12.5px; margin-top: 2px; }
  header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .streak { font-size: 13px; text-align: right; color: var(--muted); }
  .streak b { color: var(--text); font-size: 16px; }

  /* step badge — tells you what order things matter in */
  .step {
    display: inline-block; font-size: 10.5px; font-weight: 800; letter-spacing: 1.2px;
    color: var(--xp); background: #ede9fe; border-radius: 99px; padding: 3px 10px; margin-bottom: 8px;
  }
  .one .step { color: #fff; background: #ffffff22; }

  /* XP bar */
  .xpwrap { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 10px 14px; margin-bottom: 12px; }
  .xprow { display: flex; justify-content: space-between; font-size: 12.5px; color: var(--muted); margin-bottom: 6px; }
  .xprow b { color: var(--xp); }
  .xpbar { height: 8px; background: #ede9fe; border-radius: 99px; overflow: hidden; }
  .xpfill { height: 100%; background: var(--xp); border-radius: 99px; transition: width .4s; }

  /* STEP 1 — The One Thing */
  .one { background: var(--accent); color: #fff; border-radius: 14px; padding: 16px; margin-bottom: 12px; }
  .one label { font-size: 12px; letter-spacing: 1.5px; opacity: .75; font-weight: 700; }
  .one .row { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
  .one input[type=text] {
    flex: 1; background: transparent; border: none; border-bottom: 1px solid #ffffff44;
    color: #fff; font-size: 17px; font-weight: 600; padding: 4px 2px; outline: none;
  }
  .one input::placeholder { color: #ffffff66; font-weight: 400; }
  .one button { background: #fff; color: var(--accent); border: none; border-radius: 8px; padding: 9px 14px; font-weight: 700; cursor: pointer; font-size: 13px; }
  .one .hint { font-size: 12px; opacity: .55; margin-top: 8px; }
  .one.done input[type=text] { text-decoration: line-through; opacity: .6; }

  /* cards */
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 14px 16px; margin-bottom: 12px; }
  .card h2 { font-size: 13px; letter-spacing: 1px; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; }

  /* add task */
  .addrow { display: flex; gap: 6px; flex-wrap: wrap; }
  .addrow input[type=text] { flex: 1 1 100%; border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; font-size: 15px; outline: none; }
  .addrow select, .addrow button { border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; font-size: 13px; background: #fff; cursor: pointer; }
  .addrow button.add { background: var(--accent); color: #fff; border: none; font-weight: 700; flex: 1; }

  /* task list */
  .task { display: flex; align-items: center; gap: 10px; padding: 10px 4px; border-bottom: 1px solid var(--line); }
  .task:last-child { border-bottom: none; }
  .task input[type=checkbox] { width: 20px; height: 20px; accent-color: var(--xp); flex-shrink: 0; }
  .task .title { flex: 1; font-size: 15px; }
  .task.done .title { text-decoration: line-through; color: var(--muted); }
  .tag { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 99px; color: #fff; flex-shrink: 0; }
  .tag.D1 { background: var(--d1); } .tag.D2 { background: var(--d2); } .tag.D3 { background: var(--d3); }
  .est { font-size: 12px; color: var(--muted); flex-shrink: 0; }
  .task .del { border: none; background: none; color: #d1d5db; font-size: 16px; cursor: pointer; }
  .task .focusbtn { border: 1px solid var(--line); background: #fff; border-radius: 6px; font-size: 12px; padding: 4px 8px; cursor: pointer; flex-shrink: 0; }
  .empty { color: var(--muted); font-size: 13.5px; text-align: center; padding: 14px 0; }

  /* focus timer */
  .timer { text-align: center; }
  .timer .clock { font-size: 44px; font-weight: 800; letter-spacing: 2px; font-variant-numeric: tabular-nums; }
  .timer .target { font-size: 13px; color: var(--muted); margin: 4px 0 10px; }
  .timer button { border: 1px solid var(--line); background: #fff; border-radius: 10px; padding: 10px 18px; font-size: 14px; font-weight: 700; cursor: pointer; margin: 0 4px; }
  .timer button.primary { background: var(--xp); color: #fff; border: none; }

  .quote { font-size: 13.5px; color: var(--muted); font-style: italic; text-align: center; padding: 4px 8px; line-height: 1.6; }

  .tools { display: flex; gap: 8px; justify-content: center; margin-top: 6px; }
  .tools button { border: 1px solid var(--line); background: #fff; border-radius: 8px; padding: 8px 12px; font-size: 12.5px; color: var(--muted); cursor: pointer; }

  .stats { display: flex; gap: 8px; }
  .stat { flex: 1; text-align: center; background: var(--bg); border-radius: 10px; padding: 10px 4px; }
  .stat b { display: block; font-size: 20px; }
  .stat span { font-size: 11.5px; color: var(--muted); }
</style>
</head>
<body>

<header>
  <div>
    <h1>Edward OS <span style="font-size:12px;color:var(--muted);font-weight:400">v0.2</span></h1>
    <div class="sub" id="today"></div>
  </div>
  <div class="streak">Streak<br><b id="streak">0</b> days 🔥</div>
</header>

<div class="xpwrap">
  <div class="xprow"><span>Level <b id="level">1</b></span><span id="xptext">0 / 100 XP</span></div>
  <div class="xpbar"><div class="xpfill" id="xpfill" style="width:0%"></div></div>
</div>

<!-- STEP 1: if you do nothing else today, do this -->
<div class="one" id="onecard">
  <span class="step">STEP 1</span><br>
  <label>THE ONE THING</label>
  <div class="row">
    <input type="text" id="oneinput" placeholder="If nothing else gets done today, do this">
    <button id="onebtn" onclick="toggleOne()">Done</button>
  </div>
  <div class="hint">Everything below exists to protect this one line.</div>
</div>

<!-- STEP 2: add tasks -->
<div class="card">
  <span class="step">STEP 2</span>
  <h2>Add Tasks</h2>
  <div class="addrow">
    <input type="text" id="newtask" placeholder="e.g. Memorize katakana ア–コ" onkeydown="if(event.key==='Enter')addTask()">
    <select id="newdomain">
      <option value="D1">D1 Work</option>
      <option value="D2">D2 Side</option>
      <option value="D3" selected>D3 Growth</option>
    </select>
    <select id="newest">
      <option value="10">10 min</option>
      <option value="25" selected>25 min</option>
      <option value="45">45 min</option>
    </select>
    <button class="add" onclick="addTask()">Add</button>
  </div>
  <div id="tasklist" style="margin-top:8px"></div>
</div>

<!-- STEP 3: focus on one task at a time -->
<div class="card timer">
  <span class="step">STEP 3</span>
  <h2>Focus</h2>
  <div class="clock" id="clock">25:00</div>
  <div class="target" id="timertarget">No target — press ▶ next to a task</div>
  <button class="primary" id="startbtn" onclick="toggleTimer()">Start</button>
  <button onclick="resetTimer()">Reset</button>
</div>

<!-- STEP 4: review -->
<div class="card">
  <span class="step">STEP 4</span>
  <h2>Today's Review</h2>
  <div class="stats">
    <div class="stat"><b id="statdone">0</b><span>Done</span></div>
    <div class="stat"><b id="statmin">0</b><span>Focus min</span></div>
    <div class="stat"><b id="statxp">0</b><span>XP today</span></div>
  </div>
</div>

<div class="quote" id="quote"></div>

<div class="tools">
  <button onclick="exportData()">Export data</button>
  <button onclick="document.getElementById('importfile').click()">Import</button>
  <input type="file" id="importfile" accept=".json" style="display:none" onchange="importData(event)">
</div>

<script>
/* ============================================
   Data model — everything in one localStorage key
   ============================================ */
const KEY = 'edwardOS';
let state = load();

function load() {
  try { return JSON.parse(localStorage.getItem(KEY)) || fresh(); }
  catch(e) { return fresh(); }
}
function fresh() {
  return { tasks: [], one: '', oneDone: false, oneDate: '', xp: 0,
           streak: 0, lastDoneDate: '', todayXP: 0, todayMin: 0, todayDate: '' };
}
function save() { localStorage.setItem(KEY, JSON.stringify(state)); }
function todayStr() { return new Date().toISOString().slice(0,10); }

/* new day: reset daily counters, clear finished tasks */
function rollover() {
  const t = todayStr();
  if (state.todayDate !== t) {
    state.todayDate = t; state.todayXP = 0; state.todayMin = 0;
    state.tasks = state.tasks.filter(x => !x.done);
    if (state.oneDate !== t) { state.one = ''; state.oneDone = false; state.oneDate = t; }
    const yest = new Date(Date.now() - 864e5).toISOString().slice(0,10);
    if (state.lastDoneDate !== yest && state.lastDoneDate !== t) state.streak = 0;
    save();
  }
}

/* ============ STEP 1: The One Thing ============ */
function toggleOne() {
  const input = document.getElementById('oneinput');
  state.one = input.value.trim();
  if (!state.one) return;
  state.oneDone = !state.oneDone;
  state.oneDate = todayStr();
  if (state.oneDone) gainXP(30);   // finishing The One Thing = +30 XP bonus
  save(); render();
}

/* ============ STEP 2: Tasks ============ */
function addTask() {
  const input = document.getElementById('newtask');
  const title = input.value.trim();
  if (!title) return;
  state.tasks.push({
    id: Date.now(), title,
    domain: document.getElementById('newdomain').value,
    est: parseInt(document.getElementById('newest').value),
    done: false
  });
  input.value = '';
  save(); render();
}
function toggleTask(id) {
  const t = state.tasks.find(x => x.id === id);
  t.done = !t.done;
  if (t.done) { gainXP(t.est); markActive(); }
  else { state.xp = Math.max(0, state.xp - t.est); state.todayXP = Math.max(0, state.todayXP - t.est); }
  save(); render();
}
function delTask(id) {
  state.tasks = state.tasks.filter(x => x.id !== id);
  save(); render();
}

/* ============ XP & streak — no level skips ============ */
function gainXP(n) { state.xp += n; state.todayXP += n; markActive(); }
function markActive() {
  const t = todayStr();
  if (state.lastDoneDate !== t) {
    const yest = new Date(Date.now() - 864e5).toISOString().slice(0,10);
    state.streak = (state.lastDoneDate === yest) ? state.streak + 1 : 1;
    state.lastDoneDate = t;
  }
}

/* ============ STEP 3: Focus timer ============ */
let timerSec = 25 * 60, timerRunning = false, timerInterval = null, timerTaskId = null;

function pickFocus(id) {
  timerTaskId = id;
  const t = state.tasks.find(x => x.id === id);
  timerSec = (t ? t.est : 25) * 60;
  renderTimer();
  document.getElementById('timertarget').textContent = '▶ ' + (t ? t.title : '');
  window.scrollTo({ top: document.querySelector('.timer').offsetTop - 20, behavior: 'smooth' });
}
function toggleTimer() {
  if (timerRunning) { clearInterval(timerInterval); timerRunning = false; }
  else {
    timerRunning = true;
    timerInterval = setInterval(() => {
      timerSec--;
      if (timerSec <= 0) finishTimer();
      renderTimer();
    }, 1000);
  }
  document.getElementById('startbtn').textContent = timerRunning ? 'Pause' : 'Start';
}
function finishTimer() {
  clearInterval(timerInterval); timerRunning = false;
  const t = state.tasks.find(x => x.id === timerTaskId);
  state.todayMin += t ? t.est : 25;
  gainXP(5);   // completion bonus
  if (t && !t.done) { t.done = true; gainXP(t.est); }
  timerSec = 25 * 60; timerTaskId = null;
  save(); render();
  alert('Session complete. XP earned. Now stand up and drink some water — that is also part of the system.');
}
function resetTimer() {
  clearInterval(timerInterval); timerRunning = false; timerSec = 25*60; timerTaskId = null;
  document.getElementById('startbtn').textContent = 'Start';
  document.getElementById('timertarget').textContent = 'No target — press ▶ next to a task';
  renderTimer();
}
function renderTimer() {
  const m = String(Math.floor(timerSec/60)).padStart(2,'0');
  const s = String(timerSec%60).padStart(2,'0');
  document.getElementById('clock').textContent = m + ':' + s;
  document.title = timerRunning ? `${m}:${s} — Edward OS` : 'Edward OS';
}

/* ============ Mentor line — very serious yet unserious ============ */
const QUOTES = [
  'No level skips. XP is honest.',
  "Katakana is still waiting for you. Today's share takes 10 minutes.",
  'Valiante: mastery grows when the ego goes quiet. Mute the ego today.',
  'Financial statements are a foreign language. One sentence a day.',
  'There is no perfect plan. There are only 25-minute executions.',
  'Evy would say: stay calm, one thing at a time.',
  'This is fine 🔥 — but only if The One Thing is done.',
  "How to run 4 projects at once: don't run them at once.",
  "Compare yourself to yesterday's you. Everything else is noise.",
  'Golf and accounting fail the same way: rushing, not weakness.',
];
function renderQuote() {
  const q = QUOTES[new Date().getDate() % QUOTES.length];
  document.getElementById('quote').textContent = '" ' + q + ' "';
}

/* ============ Backup (localStorage is per-device) ============ */
function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'edwardOS-backup-' + todayStr() + '.json';
  a.click();
}
function importData(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try { state = JSON.parse(e.target.result); save(); render(); alert('Restored.'); }
    catch(err) { alert('Invalid file format.'); }
  };
  reader.readAsText(file);
}

/* ============ Render ============ */
const DOMAIN_LABEL = { D1: 'D1 Work', D2: 'D2 Side', D3: 'D3 Growth' };

function render() {
  rollover();
  const d = new Date();
  document.getElementById('today').textContent =
    d.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
  const level = Math.floor(state.xp / 100) + 1;
  const prog = state.xp % 100;
  document.getElementById('level').textContent = level;
  document.getElementById('xptext').textContent = prog + ' / 100 XP (total ' + state.xp + ')';
  document.getElementById('xpfill').style.width = prog + '%';
  document.getElementById('streak').textContent = state.streak;
  document.getElementById('oneinput').value = state.one;
  document.getElementById('onecard').classList.toggle('done', state.oneDone);
  document.getElementById('onebtn').textContent = state.oneDone ? 'Undo' : 'Done';
  const list = document.getElementById('tasklist');
  if (!state.tasks.length) {
    list.innerHTML = '<div class="empty">Empty. A dashboard is only a dashboard when it has data.</div>';
  } else {
    const sorted = [...state.tasks].sort((a,b) => a.done - b.done || a.domain.localeCompare(b.domain));
    list.innerHTML = sorted.map(t => `
      <div class="task ${t.done ? 'done' : ''}">
        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${t.id})">
        <span class="tag ${t.domain}">${DOMAIN_LABEL[t.domain]}</span>
        <span class="title">${escapeHtml(t.title)}</span>
        <span class="est">${t.est}m</span>
        ${t.done ? '' : `<button class="focusbtn" onclick="pickFocus(${t.id})">▶</button>`}
        <button class="del" onclick="delTask(${t.id})">✕</button>
      </div>`).join('');
  }
  document.getElementById('statdone').textContent = state.tasks.filter(t => t.done).length + (state.oneDone ? 1 : 0);
  document.getElementById('statmin').textContent = state.todayMin;
  document.getElementById('statxp').textContent = state.todayXP;
  renderTimer(); renderQuote();
}
function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

document.getElementById('oneinput').addEventListener('input', e => {
  state.one = e.target.value; state.oneDate = todayStr(); save();
});

render();
</script>
</body>
</html>
